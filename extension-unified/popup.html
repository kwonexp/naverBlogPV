<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Naver Rank Toolkit</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>조회수 순위 통합 도구</h1>
      <p class="sub" id="modeDescription">
        최근 기간(7/14일) 데이터를 모아 <strong>제목 + 작성일</strong> 기준으로 합계 집계합니다.
      </p>

      <section class="options">
        <div class="mode-tabs" role="tablist" aria-label="작업 모드">
          <button id="topTab" class="tab-btn active" data-mode="top" type="button">
            상위 글 집계 (7/14일)
          </button>
          <button id="rawTab" class="tab-btn" data-mode="raw" type="button">
            원본 순위 추출
          </button>
        </div>

        <div id="rawOptions" class="mode-options" hidden>
          <label class="check-row">
            <input id="rangeEnabled" type="checkbox" />
            <span>기간 추출 사용 (최대 7일)</span>
          </label>
          <div class="range-grid">
            <label class="field">
              <span>시작일</span>
              <input id="startDate" type="date" disabled />
            </label>
            <label class="field">
              <span>종료일</span>
              <input id="endDate" type="date" disabled />
            </label>
          </div>
        </div>

        <div id="topOptions" class="mode-options">
          <label class="field">
            <span>집계 기간</span>
            <select id="periodDays">
              <option value="7" selected>최근 7일</option>
              <option value="14">최근 14일</option>
            </select>
          </label>
        </div>
      </section>

      <section class="actions">
        <button id="extractBtn" class="primary">Extract</button>
        <button id="downloadBtn" disabled>Download CSV</button>
        <button id="copyBtn" disabled>Copy</button>
      </section>

      <section id="progressWrap" class="progress-wrap" hidden>
        <div class="progress-head">
          <span id="progressLabel">준비 중</span>
          <span id="progressValue">0%</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <p id="status" class="status">Ready.</p>

      <section>
        <h2 id="previewTitle">Preview (Top 10)</h2>
        <div class="preview-wrap">
          <table class="preview" id="previewTable">
            <thead>
              <tr>
                <th id="dateHeader">기간</th>
                <th>순위</th>
                <th>제목</th>
                <th id="viewsHeader">합계조회수</th>
                <th>타입</th>
                <th>작성일</th>
              </tr>
            </thead>
            <tbody id="previewBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
